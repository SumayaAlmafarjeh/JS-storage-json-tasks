<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .colors-container {
            margin-top: 15px;
            display: flex;
            gap: 2px;
        }
        .bg-green {
            background-color: green;
            padding: 2px 5px;
        }
        .bg-red {
            background-color: red;
            color: white;
            padding: 2px 5px;
        }
        .bg-yellow {
            background-color: yellow;
            padding: 2px 5px;
        }
        .border-container {
            margin-top: 15px;
            border: 1px solid black;
            display: inline-block;
            padding: 3px;
        }
        .border-item {
            border: 1px solid gray;
            display: inline-block;
            padding: 2px 5px;
            margin-right: 2px;
        }
    </style>
</head>
<body>

    <label for="name">Name: </label>
    <input id="name" type="text">

    <label for="email">Email: </label>
    <input id="email" type="text">

    <label for="mobile">Mobile: </label>
    <input id="mobile" type="text">

    <button id="btn">Click On Me to Print</button>

    <div class="colors-container">
        <span id="cName" class="bg-green"></span>
        <span id="cEmail" class="bg-red"></span>
        <span id="cMobile" class="bg-yellow"></span>
    </div>

    <div class="border-container">
        <div id="bName" class="border-item"></div>
        <div id="bEmail" class="border-item"></div>
        <div id="bMobile" class="border-item"></div>
    </div>

    <script>
        const btn = document.getElementById("btn");

        btn.onclick = function(){
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const mobile = document.getElementById("mobile").value;

            document.getElementById("cName").innerHTML = name;
            document.getElementById("cEmail").innerHTML = email;
            document.getElementById("cMobile").innerHTML = mobile;

            document.getElementById("bName").innerHTML = name;
            document.getElementById("bEmail").innerHTML = email;
            document.getElementById("bMobile").innerHTML = mobile;
        }
    </script>
    
</body>
</html>
